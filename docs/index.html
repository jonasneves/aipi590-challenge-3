    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: #262626; color: #E5E5E5;

        header {

        .part-label {

            white-space: nowrap;
            display: none;
            z-index: 100;
        }
        .part-label.visible { display: block; }
    </style>

<body>
    <header>
        <h1>AIPI 590 Challenge 3</h1>
        <p class="subtitle">Interactive SAC+HER Policy Visualization</p>
    </header>
    <main>
        <div id="viewport">
            <canvas id="canvas"></canvas>
            <div id="loading">Loading meshes...</div>
        </div>
        <div class="part-label" id="partLabel"></div>
        <div class="controls">
            <div class="control-group">
                <label>Episode</label>

            </div>

            </div>
        </div>
    </main>
    <footer>Trained with SAC + Hindsight Experience Replay. Fetch robot meshes from gymnasium-robotics. Rendered with <a href="https://threejs.org">Three.js</a>.</footer>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

        const MESH_FILES = {
            'robot0:base_link': 'base_link_collision.stl',
            'robot0:torso_lift_link': 'torso_lift_link_collision.stl',
            'robot0:head_pan_link': 'head_pan_link_collision.stl',
            'robot0:head_tilt_link': 'head_tilt_link_collision.stl',
            'robot0:shoulder_pan_link': 'shoulder_pan_link_collision.stl',
            'robot0:shoulder_lift_link': 'shoulder_lift_link_collision.stl',
            'robot0:upperarm_roll_link': 'upperarm_roll_link_collision.stl',
            'robot0:elbow_flex_link': 'elbow_flex_link_collision.stl',
            'robot0:forearm_roll_link': 'forearm_roll_link_collision.stl',
            'robot0:wrist_flex_link': 'wrist_flex_link_collision.stl',
            'robot0:wrist_roll_link': 'wrist_roll_link_collision.stl',
            'robot0:gripper_link': 'gripper_link.stl',
        };

        // Head links aren't in trajectory data (joints unactuated by policy).
        // Offsets are centroid-to-centroid, computed from MuJoCo body offsets
        // (robot.xml) corrected by each STL mesh's centroid position.
        const HEAD_PAN_OFFSET = new THREE.Vector3(0.096, 0, 0.342);
        const HEAD_TILT_OFFSET = new THREE.Vector3(0.106, 0, 0.003);

        const FINGER_GEOMS = ['robot0:r_gripper_finger_link', 'robot0:l_gripper_finger_link'];

        const TRAIL_COLOR_SUCCESS = 0x339898;
        const TRAIL_COLOR_FAILURE = 0xC84E00;
        const MAX_TRAIL_POINTS = 1000;

        // --- State ---
        let scene, camera, renderer, controls;
        let trajectories = [], currentEpisode = null, currentStep = 0;
        let isPlaying = false, playSpeed = 1, lastTime = 0;
        let geomMeshes = {};
        let goalMesh, trailLine, trailCount = 0;
        let trailBuffer;
        const canvas = document.getElementById('canvas');

        const _quat = new THREE.Quaternion();

        function mjQuat(q) {
            _quat.set(q[1], q[2], q[3], q[0]);
            return _quat;
        }

        function centerAtBBox(geometry) {
            geometry.computeBoundingBox();
            const c = geometry.boundingBox.getCenter(new THREE.Vector3());
            geometry.translate(-c.x, -c.y, -c.z);
        }

        function initTrailBuffer() {
            trailBuffer = new Float32Array(MAX_TRAIL_POINTS * 3);
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.BufferAttribute(trailBuffer, 3));
            geom.setDrawRange(0, 0);
            trailLine.geometry.dispose();
            trailLine.geometry = geom;
            trailCount = 0;
        }

        function appendTrailPoint(x, y, z) {
            if (trailCount >= MAX_TRAIL_POINTS) return;
            const i = trailCount * 3;
            trailBuffer[i] = x;
            trailBuffer[i + 1] = y;
            trailBuffer[i + 2] = z;
            trailCount++;
            trailLine.geometry.setDrawRange(0, trailCount);
            trailLine.geometry.attributes.position.needsUpdate = true;
        }

        function rebuildTrailFromPositions(positions) {
            trailCount = Math.min(positions.length, MAX_TRAIL_POINTS);
            for (let i = 0; i < trailCount; i++) {
                const j = i * 3;
                trailBuffer[j] = positions[i][0];
                trailBuffer[j + 1] = positions[i][1];
                trailBuffer[j + 2] = positions[i][2];
            }
            trailLine.geometry.setDrawRange(0, trailCount);
            trailLine.geometry.attributes.position.needsUpdate = true;
        }

        // --- Scene ---
        let objectMesh;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2D2D2D);
            scene.up.set(0, 0, 1);

            camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.01, 100);
            camera.up.set(0, 0, 1);
            camera.position.set(2.8, -0.5, 1.5);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            controls = new OrbitControls(camera, canvas);
            controls.target.set(1.0, 0.75, 0.55);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.update();

            const key = new THREE.DirectionalLight(0xffffff, 1.2);
            key.position.set(2, -1, 4);
            key.castShadow = true;
            key.shadow.mapSize.set(2048, 2048);
            key.shadow.normalBias = 0.02;
            key.shadow.camera.left = -2;
            key.shadow.camera.right = 2;
            key.shadow.camera.top = 2;
            key.shadow.camera.bottom = -2;
            key.shadow.camera.near = 0.5;
            key.shadow.camera.far = 8;
            scene.add(key);
            scene.add(new THREE.DirectionalLight(0xb0c4de, 0.4).translateX(-2).translateZ(2));
            scene.add(new THREE.HemisphereLight(0xc8d8f0, 0x1a1a2e, 0.4));

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(6, 6),
                new THREE.MeshStandardMaterial({ color: 0x262626, roughness: 1 })
            );
            ground.receiveShadow = true;
            scene.add(ground);

            const grid = new THREE.GridHelper(4, 20, 0x333333, 0x2A2A2A);
            grid.rotation.x = Math.PI / 2;
            scene.add(grid);

            const table = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.7, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xededed, roughness: 0.7 })
            );
            table.position.set(1.3, 0.75, 0.2);
            table.receiveShadow = true;
            table.castShadow = true;
            scene.add(table);

            // Object cube: MuJoCo box size 0.025 half-extents → 0.05 full, dark (0.2, 0.2, 0.2)
            objectMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.05, 0.05, 0.05),
                new THREE.MeshStandardMaterial({ color: new THREE.Color(0.2, 0.2, 0.2), roughness: 0.5 })
            );
            objectMesh.castShadow = true;
            scene.add(objectMesh);

            // Goal: MuJoCo target0 — pure red sphere, radius 0.02
            goalMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.02, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            scene.add(goalMesh);

            trailLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: TRAIL_COLOR_SUCCESS, transparent: true, opacity: 0.4 }));
            scene.add(trailLine);

            window.addEventListener('resize', onResize);
        }

        // MuJoCo material classes per link
        const LINK_MATERIALS = {
            'robot0:base_link': 'grey',
            'robot0:torso_lift_link': 'white',
            'robot0:head_pan_link': 'grey',
            'robot0:head_tilt_link': 'blue',
            'robot0:shoulder_pan_link': 'white',
            'robot0:shoulder_lift_link': 'blue',
            'robot0:upperarm_roll_link': 'white',
            'robot0:elbow_flex_link': 'blue',
            'robot0:forearm_roll_link': 'white',
            'robot0:wrist_flex_link': 'blue',
            'robot0:wrist_roll_link': 'white',
            'robot0:gripper_link': 'gripper',
        };

        async function loadMeshes() {
            const loader = new STLLoader();
            // MuJoCo material colors from shared.xml
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.05 });
            const greyMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(0.356, 0.361, 0.376), roughness: 0.5, metalness: 0.05 });
            const blueMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(0.086, 0.506, 0.767), roughness: 0.5, metalness: 0.05 });
            const gripMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(0.356, 0.361, 0.376), roughness: 0.5, metalness: 0.05 });
            const matMap = { white: whiteMat, grey: greyMat, blue: blueMat, gripper: gripMat };

            const promises = [];
            for (const [geomName, file] of Object.entries(MESH_FILES)) {
                promises.push(new Promise((resolve) => {
                    loader.load('meshes/fetch/' + file, (rawGeometry) => {
                        centerAtBBox(rawGeometry);
                        // Merge coincident vertices then recompute normals for smooth shading
                        const geometry = BufferGeometryUtils.mergeVertices(rawGeometry, 0.001);
                        geometry.computeVertexNormals();
                        const mat = matMap[LINK_MATERIALS[geomName]] || whiteMat;
                        const mesh = new THREE.Mesh(geometry, mat);
                        mesh.castShadow = true;
                        scene.add(mesh);
                        geomMeshes[geomName] = mesh;
                        resolve();
                    }, undefined, () => { console.warn('Failed: ' + file); resolve(); });
                }));
            }

            for (const name of FINGER_GEOMS) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.077, 0.014, 0.027), gripMat);
                mesh.castShadow = true;
                scene.add(mesh);
                geomMeshes[name] = mesh;
            }

            await Promise.all(promises);
            document.getElementById('loading').style.display = 'none';
        }

        function updateRobot(ts) {
            const geoms = ts.geoms || ts.bodies;
            if (!geoms) return;

            for (const [name, mesh] of Object.entries(geomMeshes)) {
                const g = geoms[name];
                if (!g) continue;
                mesh.visible = true;
                mesh.position.set(...g.pos);
                mesh.quaternion.copy(mjQuat(g.quat));
            }

            // Position head links relative to torso (not in trajectory data, joints unactuated)
            const torso = geoms['robot0:torso_lift_link'];
            const headPan = geomMeshes['robot0:head_pan_link'];
            const headTilt = geomMeshes['robot0:head_tilt_link'];
            if (torso && headPan) {
                const torsoQ = mjQuat(torso.quat).clone();
                headPan.position.set(...torso.pos).add(HEAD_PAN_OFFSET.clone().applyQuaternion(torsoQ));
                headPan.quaternion.copy(torsoQ);
                headPan.visible = true;
                if (headTilt) {
                    headTilt.position.copy(headPan.position).add(HEAD_TILT_OFFSET.clone().applyQuaternion(torsoQ));
                    headTilt.quaternion.copy(torsoQ);
                    headTilt.visible = true;
                }
            }

            goalMesh.position.set(...ts.goal_position);

            if (ts.object_position) {
                objectMesh.position.set(...ts.object_position);
                objectMesh.visible = true;
            } else {
                objectMesh.visible = false;
            }

            const grip = geoms['robot0:gripper_link'];
            if (grip) appendTrailPoint(...grip.pos);
        }

        function updateLegacy(ts) {
            for (const m of Object.values(geomMeshes)) m.visible = false;
            goalMesh.position.set(...ts.goal_position);
            objectMesh.visible = !!ts.object_position;
            if (ts.object_position) objectMesh.position.set(...ts.object_position);
        }

        function updateDisplay() {
            if (!currentEpisode) return;
            const ts = currentEpisode.timesteps[Math.floor(currentStep)];
            if (!ts) return;
            document.getElementById('scrubber').value = Math.floor(currentStep);
            document.getElementById('currentStep').textContent = Math.floor(currentStep);
            if (ts.geoms || ts.bodies) updateRobot(ts);
            else updateLegacy(ts);
        }

        // --- Data: load and merge all available trajectory files ---
        async function loadTrajectories() {
            const files = [
                'data/trajectories-fetchpickandplace-5ep.json',
                'data/trajectories-fetchreach-5ep.json',
                'data/trajectories.json',
            ];
            for (const f of files) {
                try {
                    const r = await fetch(f);
                    if (!r.ok) continue;
                    const data = await r.json();
                    if (Array.isArray(data) && data.length > 0) {
                        for (const ep of data) {
                            if (!trajectories.some(t => t.task === ep.task && t.episode === ep.episode)) {
                                trajectories.push(ep);
                            }
                        }
                    }
                } catch (e) { console.warn(f, e.message); }
            }
            if (trajectories.length > 0) populateEpisodes();
            else document.getElementById('episodeSelect').innerHTML = '<option>No data found</option>';
        }

        function populateEpisodes() {
            const sel = document.getElementById('episodeSelect');
            sel.innerHTML = '';
            trajectories.forEach((t, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                const task = (t.task || '').replace('Fetch', '').replace('-v4', '');
                opt.textContent = `${task} Ep${t.episode} [${t.success ? 'OK' : 'FAIL'}] (${t.length} steps)`;
                sel.appendChild(opt);
            });
            if (trajectories.length > 0) loadEpisode(0);
        }

        function loadEpisode(idx) {
            currentEpisode = trajectories[idx];
            currentStep = 0;
            atEnd = false;
            setPlaying(false);
            initTrailBuffer();

            // Encode success/failure in the trail color
            const trailColor = currentEpisode.success ? TRAIL_COLOR_SUCCESS : TRAIL_COLOR_FAILURE;
            trailLine.material.color.setHex(trailColor);

            document.getElementById('scrubber').max = currentEpisode.timesteps.length - 1;
            document.getElementById('totalSteps').textContent = currentEpisode.timesteps.length - 1;
            document.getElementById('taskLabel').textContent = (currentEpisode.task || '-').replace('Fetch', '').replace('-v4', '');
            document.getElementById('statusLabel').innerHTML = currentEpisode.success
                ? '<span class="success">Success</span>' : '<span class="failure">Failure</span>';
            document.getElementById('durationLabel').textContent = currentEpisode.length + ' steps';
            updateDisplay();
        }

        // --- Playback state ---
        let atEnd = false;

        function setPlaying(playing) {
            isPlaying = playing;
            if (playing) lastTime = Date.now();
            const btn = document.getElementById('playPauseBtn');
            if (atEnd && !playing) {
                btn.textContent = 'Replay';
            } else {
                btn.textContent = playing ? 'Pause' : 'Play';
            }
            btn.classList.toggle('active', playing);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying && currentEpisode) {
                const now = Date.now();
                currentStep += playSpeed * (now - lastTime) / 1000 * 25;
                lastTime = now;
                if (currentStep >= currentEpisode.timesteps.length - 1) {
                    currentStep = currentEpisode.timesteps.length - 1;
                    atEnd = true;
                    setPlaying(false);
                }
                updateDisplay();
            }
            controls.update();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        }

        // --- Hover labels ---
        const LABELS = {
            'robot0:base_link': 'Base',
            'robot0:torso_lift_link': 'Torso Lift',
            'robot0:head_pan_link': 'Head Pan',
            'robot0:head_tilt_link': 'Head Tilt',
            'robot0:shoulder_pan_link': 'Shoulder Pan',
            'robot0:shoulder_lift_link': 'Shoulder Lift',
            'robot0:upperarm_roll_link': 'Upper Arm Roll',
            'robot0:elbow_flex_link': 'Elbow Flex',
            'robot0:forearm_roll_link': 'Forearm Roll',
            'robot0:wrist_flex_link': 'Wrist Flex',
            'robot0:wrist_roll_link': 'Wrist Roll',
            'robot0:gripper_link': 'Gripper',
            'robot0:r_gripper_finger_link': 'Right Finger',
            'robot0:l_gripper_finger_link': 'Left Finger',
        };

        const raycaster = new THREE.Raycaster();
        const _pointer = new THREE.Vector2();
        const partLabel = document.getElementById('partLabel');
        let hoveredMesh = null;
        let _labelRaf = 0;

        // Build mesh → name lookup (populated after loadMeshes)
        let meshToName = new Map();

        function buildMeshLookup() {
            meshToName.clear();
            for (const [name, mesh] of Object.entries(geomMeshes)) {
                meshToName.set(mesh, name);
            }
            scene.traverse(obj => {
                if (obj.isMesh && !meshToName.has(obj)) {
                    if (obj === goalMesh) meshToName.set(obj, '__scene__Goal');
                    else if (obj === objectMesh) meshToName.set(obj, '__scene__Object');
                    else if (obj.geometry?.type === 'BoxGeometry' && obj.position.z < 0.3) meshToName.set(obj, '__scene__Table');
                }
            });
        }

        canvas.addEventListener('pointermove', (e) => {
            cancelAnimationFrame(_labelRaf);
            _labelRaf = requestAnimationFrame(() => {
                const rect = canvas.getBoundingClientRect();
                _pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                _pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                raycaster.setFromCamera(_pointer, camera);
                const hits = raycaster.intersectObjects(scene.children, false);

                let name = null;
                for (const hit of hits) {
                    const n = meshToName.get(hit.object);
                    if (n) { name = n; break; }
                }

                if (name) {
                    let displayName;
                    if (name.startsWith('__scene__')) displayName = name.slice(9);
                    else displayName = LABELS[name] || name;

                    partLabel.textContent = displayName;
                    partLabel.style.left = (e.clientX + 14) + 'px';
                    partLabel.style.top = (e.clientY - 32) + 'px';
                    partLabel.classList.add('visible');
                } else {
                    partLabel.classList.remove('visible');
                }
            });
        });

        canvas.addEventListener('pointerleave', () => {
            partLabel.classList.remove('visible');
        });

        // --- Events ---
        document.getElementById('episodeSelect').addEventListener('change', e => loadEpisode(+e.target.value));
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            if (atEnd) {
                currentStep = 0;
                atEnd = false;
                initTrailBuffer();
                updateDisplay();
                setPlaying(true);
            } else {
                setPlaying(!isPlaying);
            }
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            currentStep = 0; atEnd = false;
            setPlaying(false);
            initTrailBuffer();
            updateDisplay();
        });
        document.getElementById('scrubber').addEventListener('input', e => {
            currentStep = +e.target.value; atEnd = false; setPlaying(false);
            const positions = [];
            for (let i = 0; i <= currentStep; i++) {
                const g = currentEpisode.timesteps[i]?.geoms?.['robot0:gripper_link'] || currentEpisode.timesteps[i]?.bodies?.['robot0:gripper_link'];
                if (g) positions.push(g.pos);
            }
            rebuildTrailFromPositions(positions);
            updateDisplay();
        });
        document.getElementById('speedControl').addEventListener('input', e => {
            playSpeed = +e.target.value;
            document.getElementById('speedValue').textContent = playSpeed.toFixed(1) + 'x';
        });

        // --- Init ---
        initScene();
        await loadMeshes();
        buildMeshLookup();
        await loadTrajectories();
        animate();
    </script>
</body>
</html>
