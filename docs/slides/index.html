<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenge 3 — Slides</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --slide-accent: #00539B;
    --accent: #C84E00;
    --bg: #ffffff;
    --text: #012169;
    --text-muted: #666666;
    --surface-raised: #f0f2f5;
    --border: #E2E6ED;
    --border-subtle: #F3F2F1;
    --mono: 'SF Mono', 'Fira Code', monospace;
    --slide-w: min(95vw, 960px);
    --sf: calc(var(--slide-w) / 100);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0e0e0e; color: #e0e0e0;
    padding: 40px 0;
  }
  .toolbar {
    max-width: var(--slide-w);
    margin: 0 auto 24px;
    display: flex; justify-content: flex-end;
  }
  .toolbar button {
    font-family: inherit; font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 16px; border: 1px solid #444; border-radius: 4px;
    background: #222; color: #aaa; cursor: pointer;
  }
  .toolbar button:hover { background: #333; color: #ddd; }
  .toolbar button.active { border-color: #C84E00; color: #C84E00; }

  /* ── Slide wrapper ─────────────────────────────────────────────── */
  .slide-wrapper { max-width: var(--slide-w); margin: 0 auto 48px; }

  /* ── Slide frame (16:9, matches agora presenting mode) ─────────── */
  .slide {
    width: 100%; aspect-ratio: 16 / 9;
    background-color: var(--bg);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    padding: calc(3 * var(--sf)) calc(4 * var(--sf)) calc(8 * var(--sf));
    font-size: calc(2 * var(--sf));
    box-shadow: 0 8px 48px rgba(0,0,0,0.7);
  }
  /* Duke logo */
  .slide::after {
    content: '';
    position: absolute;
    bottom: 5%; right: 4%;
    width: 10%;
    aspect-ratio: 578 / 486;
    background: url(img/duke-logo.png) no-repeat center/contain;
    opacity: 0.6;
    pointer-events: none;
  }

  /* ── Cover slide ───────────────────────────────────────────────── */
  .slide--cover {
    background: #012169 url(img/cover.jpg) center/cover;
    justify-content: center;
    padding-bottom: calc(3 * var(--sf));
  }
  .slide--cover::after { filter: invert(1); opacity: 0.25; }
  .slide--cover .tag { color: rgba(243,242,241,0.75); }
  .slide--cover .tag::before { background: rgba(243,242,241,0.75); }
  .slide--cover h2 { color: #F3F2F1; }
  .slide--cover h2 em { color: var(--accent); }
  .slide--cover .subtitle { color: rgba(243,242,241,0.60); font-weight: 300; margin-top: 0.3em; font-size: calc(2.08 * var(--sf)); }
  .slide--cover .names {
    color: rgba(243,242,241,0.60);
    margin-top: 1em; padding-top: 0.6em;
    border-top: 1px solid rgba(255,255,255,0.15);
    font-size: calc(1.46 * var(--sf));
  }

  /* ── Tag ────────────────────────────────────────────────────────── */
  .tag {
    font-size: calc(1.25 * var(--sf));
    font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--slide-accent);
    margin-bottom: calc(0.5 * var(--sf));
    display: flex; align-items: center;
    gap: calc(0.52 * var(--sf));
  }
  .tag::before {
    content: ''; display: inline-block;
    width: calc(1.25 * var(--sf)); height: 2px;
    background: var(--slide-accent); border-radius: 999px;
  }

  /* ── Headings ──────────────────────────────────────────────────── */
  h2 {
    font-size: calc(3.13 * var(--sf)); font-weight: 700;
    letter-spacing: -0.025em; line-height: 1.05;
    margin-bottom: calc(1.25 * var(--sf));
    color: var(--text);
  }
  h2 em { font-style: normal; color: var(--slide-accent); }
  .slide--cover h2 { font-size: calc(4.69 * var(--sf)); line-height: 1.0; letter-spacing: -0.03em; }

  /* ── Bullets ───────────────────────────────────────────────────── */
  ul.bullets {
    list-style: none; display: flex; flex-direction: column;
    gap: calc(1.15 * var(--sf)); margin-top: calc(0.5 * var(--sf));
  }
  .bullets li {
    display: flex; align-items: flex-start;
    gap: calc(0.8 * var(--sf));
    font-size: calc(1.88 * var(--sf));
    color: var(--text-muted); line-height: 1.6;
  }
  .bullets li::before {
    content: '\2013'; color: var(--slide-accent);
    font-family: var(--mono); font-size: calc(1.5 * var(--sf));
    margin-top: 1px; flex-shrink: 0; font-weight: 600;
  }
  .bullets li strong { color: var(--text); font-weight: 500; }

  /* ── Callout ───────────────────────────────────────────────────── */
  .callout {
    border-left: 2px solid var(--slide-accent);
    padding: calc(0.56 * var(--sf)) calc(1 * var(--sf));
    font-size: calc(1.56 * var(--sf));
    color: var(--text-muted); line-height: 1.65;
    margin-top: calc(1 * var(--sf));
  }

  /* ── Pipeline ──────────────────────────────────────────────────── */
  .pipeline {
    display: flex; align-items: center; justify-content: center;
    margin: calc(1.25 * var(--sf)) 0; flex-wrap: wrap;
  }
  .pipe-step {
    display: flex; flex-direction: column; align-items: center;
    gap: calc(0.25 * var(--sf));
    padding: calc(0.83 * var(--sf)) calc(1.25 * var(--sf));
    background: var(--surface-raised); border-radius: 0.375rem;
    min-width: calc(10 * var(--sf)); text-align: center;
  }
  .pipe-num { font-size: calc(1.25 * var(--sf)); font-weight: 700; color: var(--slide-accent); }
  .pipe-label { font-size: calc(1.25 * var(--sf)); font-weight: 700; color: var(--text); }
  .pipe-desc { font-size: calc(1.25 * var(--sf)); color: var(--text-muted); }
  .pipe-arrow { font-size: calc(1.67 * var(--sf)); color: var(--text-muted); padding: 0 calc(0.4 * var(--sf)); }

  /* ── Stats ─────────────────────────────────────────────────────── */
  .stats {
    display: flex; gap: calc(1.67 * var(--sf));
    margin: calc(1 * var(--sf)) 0 calc(1.25 * var(--sf));
  }
  .stat {
    flex: 1; padding: calc(1.25 * var(--sf)) calc(1.67 * var(--sf));
    background: var(--surface-raised); border-radius: 0.375rem; text-align: center;
  }
  .stat-label {
    font-size: calc(1.25 * var(--sf)); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin-bottom: calc(0.25 * var(--sf));
  }
  .stat-value { font-size: calc(2.29 * var(--sf)); font-weight: 700; color: var(--text); }

  /* ── Table ─────────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: calc(1.67 * var(--sf)); margin: calc(0.5 * var(--sf)) 0; }
  th {
    text-align: left;
    font-size: calc(1.25 * var(--sf)); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted);
    padding: calc(0.67 * var(--sf)) calc(1.25 * var(--sf));
    border-bottom: 2px solid var(--border);
  }
  td {
    padding: calc(0.52 * var(--sf)) calc(1.25 * var(--sf));
    border-bottom: 1px solid var(--border-subtle);
    color: var(--text);
  }

  /* ── Split layout ──────────────────────────────────────────────── */
  .split {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: calc(2 * var(--sf)); flex: 1; align-items: center;
    margin-top: calc(0.5 * var(--sf)); min-height: 0;
  }
  .split img {
    width: 100%; height: 100%; object-fit: contain;
    border-radius: calc(0.75 * var(--sf));
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .split--img-left { grid-template-columns: 55% 1fr; }

  /* ── Slide number ──────────────────────────────────────────────── */
  .slide-num {
    position: absolute; bottom: calc(1.5 * var(--sf)); left: calc(4 * var(--sf));
    font-size: calc(1 * var(--sf)); color: #ccc;
  }
  .slide--cover .slide-num { color: rgba(243,242,241,0.3); }

  /* ── Speaker notes (below slide) ───────────────────────────────── */
  .notes {
    margin-top: 12px; padding: 16px 20px;
    background: #1a1a1a; border-left: 3px solid #C84E00;
    border-radius: 4px; font-size: 13px; color: #999; line-height: 1.7;
  }
  .notes-header {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: #C84E00; margin-bottom: 8px;
  }
  .notes strong { color: #C84E00; font-weight: 600; }
  .notes-hidden .notes { display: none; }

  /* helpers */
  .mt8 { margin-top: calc(0.5 * var(--sf)); }

  /* ── Mobile ──────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    :root { --slide-w: 100vw; }
    body { padding: 16px 0; }

    /* Break out of 16:9 — let content breathe */
    .slide {
      aspect-ratio: auto;
      min-height: auto;
      padding: 24px 20px 32px;
      font-size: max(14px, calc(2 * var(--sf)));
    }
    .slide::after { width: 48px; bottom: 12px; right: 12px; }

    .slide-wrapper { margin-bottom: 28px; }

    /* Cover slide */
    .slide--cover { padding: 40px 20px 32px; }
    .slide--cover h2 { font-size: max(22px, calc(4.69 * var(--sf))); }
    .slide--cover .subtitle { font-size: max(14px, calc(2.08 * var(--sf))); }
    .slide--cover .names { font-size: max(12px, calc(1.46 * var(--sf))); }

    /* Typography floors */
    .tag { font-size: max(10px, calc(1.25 * var(--sf))); }
    h2 { font-size: max(20px, calc(3.13 * var(--sf))); margin-bottom: 12px; }
    .bullets li { font-size: max(14px, calc(1.88 * var(--sf))); }
    .callout { font-size: max(13px, calc(1.56 * var(--sf))); }
    .slide-num { font-size: max(10px, calc(1 * var(--sf))); }

    /* Stats: 2-column grid */
    .stats { flex-wrap: wrap; gap: 8px; }
    .stat { flex: 1 1 calc(50% - 8px); min-width: 0; padding: 12px 10px; }
    .stat-label { font-size: max(9px, calc(1.25 * var(--sf))); }
    .stat-value { font-size: max(16px, calc(2.29 * var(--sf))); }

    /* Split: stack vertically */
    .split, .split--img-left { grid-template-columns: 1fr; gap: 12px; }
    .split img { max-height: 240px; width: 100%; object-fit: contain; }

    /* Pipeline: vertical */
    .pipeline { flex-direction: column; align-items: stretch; gap: 6px; }
    .pipe-step { min-width: 0; padding: 10px 14px; }
    .pipe-arrow { transform: rotate(90deg); text-align: center; padding: 0; font-size: 16px; }
    .pipe-num, .pipe-label, .pipe-desc { font-size: max(12px, calc(1.25 * var(--sf))); }

    /* Table */
    table { font-size: max(12px, calc(1.67 * var(--sf))); display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    th { font-size: max(10px, calc(1.25 * var(--sf))); padding: 6px 10px; white-space: nowrap; }
    td { padding: 6px 10px; }

    /* Notes */
    .notes { font-size: 13px; padding: 12px 14px; }
    .toolbar { padding: 0 12px; margin-bottom: 16px; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <button id="toggleNotes">Speaker Notes</button>
</div>
<div id="slides"></div>
<script type="module">
import { deck } from './content.js';

const container = document.getElementById('slides');
const slideIds = Object.keys(deck.slides);
let notesVisible = false;

document.getElementById('toggleNotes').addEventListener('click', (e) => {
  notesVisible = !notesVisible;
  e.target.classList.toggle('active', notesVisible);
  container.querySelectorAll('.slide-wrapper').forEach(w => {
    w.classList.toggle('notes-hidden', !notesVisible);
  });
});

slideIds.forEach((id, idx) => {
  const s = deck.slides[id];
  const isCover = id === 's1' || id === 's11';

  const wrapper = document.createElement('div');
  wrapper.className = 'slide-wrapper notes-hidden';

  const div = document.createElement('div');
  div.className = 'slide' + (isCover ? ' slide--cover' : '');

  let html = '';
  html += `<div class="slide-num">${idx + 1} / ${slideIds.length}</div>`;

  if (s.tag) html += `<div class="tag">${s.tag}</div>`;

  if (s.title) html += `<h2>${s.title}</h2>`;
  else if (s.heading) html += `<h2>${s.heading}</h2>`;

  if (s.subtitle) html += `<div class="subtitle">${s.subtitle}</div>`;
  if (s.name && isCover) html += `<div class="names">${s.name}</div>`;

  if (s.pipeline) {
    html += '<div class="pipeline">';
    s.pipeline.forEach((p, i) => {
      html += `<div class="pipe-step"><div class="pipe-num">${i+1}</div><div class="pipe-label">${p.label}</div><div class="pipe-desc">${p.desc}</div></div>`;
      if (i < s.pipeline.length - 1) html += '<div class="pipe-arrow">\u2192</div>';
    });
    html += '</div>';
  }

  if (s.stats) {
    html += '<div class="stats">';
    s.stats.forEach(st => html += `<div class="stat"><div class="stat-label">${st.label}</div><div class="stat-value">${st.value}</div></div>`);
    html += '</div>';
  }

  if (s.comparisonTable) {
    const t = s.comparisonTable;
    html += '<table><thead><tr>' + t.headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    t.rows.forEach(row => {
      html += '<tr>' + row.map(cell => {
        if (typeof cell === 'object') return `<td>${cell.value}</td>`;
        return `<td>${cell}</td>`;
      }).join('') + '</tr>';
    });
    html += '</tbody></table>';
  }

  if (s.img && s.bullets) {
    html += `<div class="split${s.img.includes('rollout') ? ' split--img-left' : ''}">`;
    if (s.img.includes('rollout')) {
      html += `<div><img src="${s.img}" alt="${s.imgAlt || ''}"></div><div><ul class="bullets">${s.bullets.map(b => `<li>${b}</li>`).join('')}</ul></div>`;
    } else {
      html += `<div><ul class="bullets">${s.bullets.map(b => `<li>${b}</li>`).join('')}</ul></div><div><img src="${s.img}" alt="${s.imgAlt || ''}"></div>`;
    }
    html += '</div>';
  } else {
    if (s.bullets) html += '<ul class="bullets">' + s.bullets.map(b => `<li>${b}</li>`).join('') + '</ul>';
    if (s.img && !s.bullets) html += `<div style="display:flex;justify-content:center;flex:1;min-height:0"><img src="${s.img}" alt="${s.imgAlt || ''}" style="max-width:80%;max-height:100%;object-fit:contain;border-radius:calc(0.75 * var(--sf));box-shadow:0 2px 12px rgba(0,0,0,0.08)"></div>`;
  }

  if (s.callout) html += `<div class="callout">${s.callout}</div>`;

  div.innerHTML = html;
  wrapper.appendChild(div);

  if (s.notes) {
    const notes = document.createElement('div');
    notes.className = 'notes';
    const rendered = s.notes.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    notes.innerHTML = `<div class="notes-header">Speaker: ${s.speaker || '?'}</div>${rendered}`;
    wrapper.appendChild(notes);
  }

  container.appendChild(wrapper);
});
</script>
</body>
</html>
